name: Feature request
description: Suggest an idea or improvement for wrud
title: "[feat]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement!
        
        wrud answers four questions: **Understand the session - Right-size the model - Teach the agent - See it across a team.**
        Before opening, please check whether your idea maps to one of these. Requests that add scope without a clear fit will likely be deferred.
        
        Search [existing issues](https://github.com/eliransu/wrud/issues) before opening - your idea may already exist.

  - type: dropdown
    id: core-question
    attributes:
      label: Which core question does this serve?
      description: Pick the best fit. If none apply, explain in "Additional context".
      options:
        - "Understand the session (what the agent did, in what order, and how it ended)"
        - "Right-size the model (detect over/under powered model usage)"
        - "Teach the agent (turn mistakes into reusable lessons)"
        - "See it across a team/org (rollup and overview)"
        - "None - see additional context"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you experiencing, or what gap are you trying to fill?
      placeholder: "Currently, when I... I cannot... which means..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Be as specific as you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?

  - type: dropdown
    id: layer
    attributes:
      label: Which layer does this touch?
      description: Select all that apply.
      multiple: true
      options:
        - "API (packages/server)"
        - "SDK (packages/sdk)"
        - "Dashboard / platform (apps/platform)"
        - "CLI (packages/cli)"
        - "Shared contract (packages/shared / OpenAPI)"
        - "Examples / documentation"
        - "CI / tooling"
        - "Not sure"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art, or anything else that helps.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This idea maps to one of the four core questions (or I explained why in "Additional context")
          required: true
