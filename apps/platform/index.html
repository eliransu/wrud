<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Defense-in-depth: restrict where the page may connect. The API key lives in
      localStorage, so confining connect-src to self + localhost means an injected script
      cannot exfiltrate it to an off-host origin. 'unsafe-inline'/'unsafe-eval' are required
      by Vite dev + antd's CSS-in-JS; tighten script-src with hashes for a hardened build.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:* ws://localhost:*"
    />
    <title>wrud — What R U Doing</title>
    <!-- Set the theme before first paint (no flash): stored choice, else OS preference. -->
    <script>
      (function () {
        try {
          var k = localStorage.getItem("wrud_theme");
          var dark = k
            ? k === "dark"
            : matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
